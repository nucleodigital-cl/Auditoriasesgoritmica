<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auditoría Ciudadana PACSEJ v3.0</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #3498db;
            --bg: #f4f7f6;
            --low-risk: #27ae60;
            --limited-risk: #f1c40f;
            --high-risk: #e67e22;
            --unacceptable: #c0392b;
        }

        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: var(--primary); line-height: 1.6; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: var(--primary); margin-bottom: 10px; }
        .description { font-style: italic; text-align: center; margin-bottom: 30px; color: #666; }
        
        .section-title { background: var(--primary); color: white; padding: 10px 15px; border-radius: 5px; margin-top: 25px; }
        .question { margin-bottom: 20px; border-bottom: 1px solid #eee; padding-bottom: 15px; }
        .question p { font-weight: 600; margin-bottom: 10px; }
        
        .options { display: flex; gap: 10px; flex-wrap: wrap; }
        .options label { background: #eee; padding: 8px 15px; border-radius: 20px; cursor: pointer; transition: 0.3s; font-size: 0.9em; }
        .options input { display: none; }
        .options input:checked + label { background: var(--accent); color: white; }

        #module-selector { margin: 20px 0; padding: 15px; border: 2px solid var(--accent); border-radius: 8px; }
        select { width: 100%; padding: 10px; border-radius: 5px; border: 1px solid #ccc; font-size: 1em; }

        .btn-calculate { display: block; width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 8px; font-size: 1.2em; font-weight: bold; cursor: pointer; margin-top: 30px; }
        .btn-calculate:hover { background: #1a252f; }

        #result-area { display: none; margin-top: 30px; padding: 25px; border-radius: 10px; text-align: center; }
        .risk-badge { display: inline-block; padding: 10px 20px; border-radius: 50px; color: white; font-weight: bold; margin: 15px 0; font-size: 1.4em; }
        .sesgoritmo { font-weight: bold; color: #c0392b; }
    </style>
</head>
<body>

<div class="container">
    <h1>🛡️ Cuestionario Ciudadano</h1>
    <p class="description">¿Qué tan segura es la IA que estás usando? (PACSEJ v3.0)</p>

    <div id="quiz-form">
        <div class="section-title">📑 SECCIÓN 1: NÚCLEO COMÚN</div>
        <div id="core-questions"></div>

        <div class="section-title">🤖 SECCIÓN 2: ELIGE TU CASO</div>
        <div id="module-selector">
            <p>Selecciona el tipo de sistema que estás evaluando:</p>
            <select id="module-choice" onchange="renderModule()">
                <option value="A">MÓDULO A: IAs que responden dudas o escriben textos</option>
                <option value="B">MÓDULO B: IA en el Trabajo</option>
                <option value="C">MÓDULO C: IA en Juicios o Policías</option>
                <option value="D">MÓDULO D: IA para Bonos y Ayuda Social</option>
            </select>
        </div>
        <div id="module-questions"></div>

        <button class="btn-calculate" onclick="calculateScore()">📊 Calcular Nivel de Riesgo</button>
    </div>

    <div id="result-area">
        <h2 id="result-title">Tu Resultado</h2>
        <div id="risk-label" class="risk-badge"></div>
        <p id="result-text"></p>
        <hr>
        <p id="sesgoritmo-info"></p>
    </div>
</div>

    function createQuestionHTML(text, index, section) {
        return `
            <div class="question">
                <p>${text}</p>
                <div class="options">
                    <input type="radio" name="${section}_${index}" value="4" id="${section}_${index}_si"><label for="${section}_${index}_si">SÍ</label>
                    <input type="radio" name="${section}_${index}" value="1" id="${section}_${index}_no"><label for="${section}_${index}_no">NO</label>
                    <input type="radio" name="${section}_${index}" value="0" id="${section}_${index}_ns"><label for="${section}_${index}_ns">NO SÉ / NO INFO</label>
                </div>
            </div>`;
    }

    function init() {
        const coreContainer = document.getElementById('core-questions');
        coreContainer.innerHTML = coreData.map((q, i) => createQuestionHTML(q, i, 'core')).join('');
        renderModule();
    }

    function renderModule() {
        const mod = document.getElementById('module-choice').value;
        const modContainer = document.getElementById('module-questions');
        modContainer.innerHTML = modulesData[mod].map((q, i) => createQuestionHTML(q, i, 'mod')).join('');
    }
